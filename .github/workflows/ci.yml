# .github/workflows/ci.yml — CI: сборка, тесты и install-flow (AC14, ADR-004)
#
# SECURITY-BASELINE §6: все шаги выполняются в Docker-контейнерах.
# Офлайн-сборка из vendor/ (-mod=vendor, CGO_ENABLED=0, без go mod download).
# Секреты: токены/ключи только через GitHub Secrets — НЕ в этом файле (SR-110).
#
# Примечание ADR-004: этот файл — артефакт на будущее. Remote отсутствует —
# CI не запускается. Локальный гейт v1: make ci-local.
#
# Кэш setup-go отключён (офлайн/vendor — сеть не нужна, ADR-001).
#
# Триггеры: push и PR в main/develop; manual dispatch.

name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  # CGO_ENABLED=0 — статические бинари (AC15, SR-112).
  CGO_ENABLED: "0"

jobs:
  # ── go vet + unit-тесты (offline, vendor) ────────────────────────────────
  test:
    name: go vet + unit tests
    runs-on: ubuntu-latest
    container:
      image: golang:1.25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: go vet
        run: go vet -mod=vendor ./...

      - name: unit tests (offline vendor)
        run: go test -mod=vendor -v -count=1 ./...

  # ── Кросс-компиляция под 4 цели (AC8/AC15) ───────────────────────────────
  build:
    name: build (4 targets)
    runs-on: ubuntu-latest
    needs: test
    container:
      image: golang:1.25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        run: |
          VER=$(git describe --tags --always 2>/dev/null || echo "dev")
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: build-all (4 цели, CGO_ENABLED=0, offline)
        run: make build-all VERSION=${{ steps.version.outputs.version }}

      - name: release-all (архивы + SHA256SUMS)
        run: make release-all VERSION=${{ steps.version.outputs.version }}

      - name: Verify SHA256SUMS
        run: |
          cd dist
          sha256sum -c SHA256SUMS
          echo "SHA256SUMS verified OK"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raxd-dist-${{ steps.version.outputs.version }}
          path: |
            dist/raxd_*.tar.gz
            dist/SHA256SUMS
          retention-days: 7

  # ── install-flow в чистом контейнере (AC12, baseline §6) ─────────────────
  install-flow:
    name: install-flow test (debian)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        run: |
          VER=$(git describe --tags --always 2>/dev/null || echo "dev")
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: raxd-dist-${{ steps.version.outputs.version }}
          path: dist/

      - name: test-install (Dockerfile.install, мок-HTTP 127.0.0.1)
        run: make test-install VERSION=${{ steps.version.outputs.version }}
